name: movere_ai
description: "Movere AI - Dijital denge, odaklanma ve farkındalık uygulaması"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # UI / Fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6

  # Local storage (Sprint 11)
  sqflite: ^2.3.3
  path_provider: ^2.1.3

  # Firebase (Sprint 12-13) — Sprint 12'de yorumdan çıkarılacak.
  # Şimdilik kapalı: UI sprint'lerinde build sürelerini kısaltmak için.
  # firebase_core: ^2.31.0
  # firebase_auth: ^4.19.5
  # cloud_firestore: ^4.17.4

  # Charts (Sprint 7)
  fl_chart: ^0.68.0

  # Localization (Sprint 15)
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/fonts/
